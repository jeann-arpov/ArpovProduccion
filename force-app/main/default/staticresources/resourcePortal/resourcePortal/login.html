<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="assets/global.css">
    <!-- <link rel="stylesheet" type="text/css" href="assets/internas.css"> -->
</head>

<body class="login">
    <div class="content">
        <div class="bgimage">
            <div class="gradient"></div>
            <img src="./images/login-bg.webp" alt="Sembrá Evolución">
        </div>
        <div class="title">
            <h1>
                <small>Accedé siempre y con beneficios</small>
                a lo último en genética y tecnología
            </h1>
        </div>
        <div class="formulario">
            <div class="shadow radius z1">
                <form action="">
                    <img src="./images/logo.svg" alt="Sembrá Evolución - Login">
                    <div class="input-control">
                        <input type="number" placeholder="CUIT">
                    </div>
                    <div class="input-control">
                        <input type="email" placeholder="Email">
                    </div>
                    <div class="input-control">
                        <input type="password" placeholder="Contraseña">
                    </div>
                    <div class="input-control">
                        <input type="button" value="Ingresar">
                    </div>
                </form>
            </div>
            <a href="" class="shadow radius bottom z2">No tenés cuenta? <strong>Registrate</strong></a>
            <a href="" class="shadow radius bottom z3">Olvidaste la contraseña? <strong>Hace click aquí</strong></a>
        </div>
    </div>
</body>

</html>
