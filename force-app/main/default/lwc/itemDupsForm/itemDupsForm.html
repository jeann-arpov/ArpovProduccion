<template>
    <template for:each={items} for:item="item" for:index="index">
        <lightning-record-edit-form object-api-name="Item_de_DUP__c" record-id={item.data.recordId} key={item.id}>
            <lightning-input if:true={dups} label="Id" name="Id" value={item.data.Id} class="slds-hide"></lightning-input>
            <lightning-layout horizontal-align="center" vertical-align="center">
                <lightning-layout-item size="2">
                    <lightning-combobox name="Producto__c" variant={item.variant} label="Variedad" value={item.data.Producto__c} placeholder="Seleccionar variedad" options={variedades} required></lightning-combobox>
                </lightning-layout-item>
                <lightning-layout-item size="2">
                    <lightning-input name="Unidad_de_Medida_Declarada__c" variant={item.variant} label="Unidad de Medida" read-only="true" value="Hectáreas"></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item size="2">
                    <lightning-input-field variant={item.variant} field-name="Cantidad_Declarada__c" value={item.data.Cantidad_Declarada__c}  required></lightning-input-field>
                </lightning-layout-item>
                <lightning-layout-item size="2">
                    <lightning-input-field variant={item.variant}  field-name="Densidad_de_Siembra__c" value={item.data.Densidad_de_Siembra__c}   required></lightning-input-field>
                </lightning-layout-item>
                <lightning-layout-item size="2">
                    <lightning-input-field variant={item.variant}  field-name="Lugar_de_Siembra__c" value={item.data.Lugar_de_Siembra__c}   required></lightning-input-field>
                </lightning-layout-item>
                <lightning-layout-item size="1">
                    <lightning-input-field variant={item.variant}  field-name="Siembra_de_Segunda__c" value={item.data.Siembra_de_Segunda__c}  ></lightning-input-field>
                </lightning-layout-item>               
                <lightning-layout-item size="1">
                    <lightning-icon class="slds-m-left--x-small" icon-name="action:new" access-key={item.id} id={index} alternative-text="Add Row" size="x-small" title="Add Row" onclick={addRow}></lightning-icon>
                    <lightning-icon class="slds-m-left--x-small" if:false={item.data.Id} icon-name="action:delete" access-key={item.id} id={index} alternative-text="Delete Row" size="x-small" title="Delete Row" onclick={removeRow}></lightning-icon>    
                </lightning-layout-item>                            
            </lightning-layout>
        </lightning-record-edit-form>
    </template>
</template>
