<template>
    <div>
        <lightning-spinner if:true={loading} alternative-text="Loading" size="medium" style="background-color: transparent;"></lightning-spinner>
        <div style="margin:auto;width:30%">
            <div class="slds-text-heading_medium slds-m-bottom_small">Cambiar Contraseña</div>
            <template if:true={message}>
                <div class={messageClass}>{message}</div>
            </template>
            <div class="slds-p-bottom_small lgc-bg" if:false={isPortalArpov}>
                <lightning-input variant="label-hidden" message-when-value-missing="Completá este campo" value={oldPassword} type="password" required onchange={handleChange} placeholder="Contraseña Actual"></lightning-input>
            </div>
            <div class="slds-p-bottom_small lgc-bg" if:false={isPortalArpov}>
                <lightning-input variant="label-hidden" message-when-value-missing="Completá este campo" value={password} type="password" required onchange={handleChange} placeholder="Nueva Contraseña"></lightning-input>
            </div>
            <div class="slds-p-bottom_small lgc-bg" if:false={isPortalArpov}>
                <lightning-input data-id="passconfirm" variant="label-hidden" message-when-value-missing="Completá este campo" value={passwordConfirm} type="password" required onchange={handleChange} placeholder="Confirmar Nueva Contraseña"></lightning-input>
            </div>
            <button class="slds-button slds-button_brand slds-button_stretch" onclick={changePassword}>Confirmar</button>
        </div>
    </div>
</template>
