<template>
    <div style={backgroundStyle}>
    <div class="reset-form">
      <lightning-spinner if:true={showSpinner} alternative-text="Loading" size="medium"></lightning-spinner>
        <template if:false={identifier}> 
            <div class="login">
                <div class="container">
                <template if:false={isPortalArpov}>
                    <div if:true={urlLogoSe.data}>
                        <center><img src={urlLogoSe.data} style="height: 80px;"/></center>
                    </div>
                </template>
                <div if:true={showMessage} class={messageClass} data-message-container></div>
                <div class="slds-p-vertical_small lgc-bg">
                     <lightning-input variant="label-hidden" placeholder="CUIT" message-when-value-missing="Completá este campo" value={cuit} type="string" required onchange={handleChange} onkeypress={checkEnterKey} max-length="11" pattern="[0-9]+" message-when-pattern-mismatch="Ingrese los dígitos de cuit sin espacios ni guiones"></lightning-input>
                </div>
                <div class="slds-p-bottom_small lgc-bg">
                   <lightning-input variant="label-hidden" placeholder="Email" message-when-value-missing="Completá este campo" value={email} type="email" required onchange={handleChange} onkeypress={checkEnterKey}></lightning-input>
                </div>
                <button class="slds-button slds-button_brand slds-button_stretch" onclick={openModal}>Recuperar Contraseña</button>
                </div>
                <div class="card-options">
                    <div class="option"><p><a href="#" data-page="login" onclick={handleNavigate}>Volver al login</a></p></div>
                </div>
            </div>
        </template>
        </div>
    </div>    

    <template if:true={modal}>
        <div class="modal-backdrop">
            <div class="modal">
                <button class="close-button" onclick={closeModal}>&times;</button>
                <p class="modal-title">Regeneración de Contraseña</p>
                <p class="modal-description">
                    Tu contraseña será regenerada.
                </p>
                <p class="note">
                    Recibirás un correo electrónico con un enlace para confirmar el cambio de contraseña.
                    El correo puede tardar hasta un máximo de 10 minutos en llegar.
                </p>
                <button class="action-button" onclick={resetPassword}>
                    Aceptar
                </button>
            </div>
        </div>
    </template>

</template>
