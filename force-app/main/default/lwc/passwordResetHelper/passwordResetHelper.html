<template>
    <lightning-card title="Reset de Contraseña - Mesa de Ayuda" icon-name="standard:user">
        <div class="container">
            <section class="hero">
                <h2>Reset Manual de Acceso</h2>
                <p>Buscá al usuario con Email y CUIT para evitar errores, luego definí la nueva contraseña.</p>
            </section>

            <!-- PASO 1: Búsqueda de Usuario -->
            <div class={searchStepContainerClass}>
                <div class="step-number">
                    <span class={stepOneBadgeClass}>1</span>
                </div>
                <div class="step-content">
                    <h3>Buscar Usuario</h3>
                    <p class="step-description">Ingresá Email y CUIT para una búsqueda precisa.</p>

                    <div class="search-grid">
                        <div class="form-group">
                        <lightning-input
                            class="search-input"
                            type="email"
                            label="Email de Usuario"
                            placeholder="ej: usuario@ejemplo.com"
                            value={searchEmail}
                            onchange={handleEmailChange}
                            onkeydown={handleSearchByEnter}
                            disabled={isLoading}
                        ></lightning-input>
                        </div>

                        <div class="form-group">
                            <lightning-input
                                class="search-input"
                                type="text"
                                label="CUIT"
                                placeholder="11 dígitos sin guiones"
                                value={searchCuit}
                                onchange={handleCuitChange}
                                onkeydown={handleSearchByEnter}
                                disabled={isLoading}
                                maxlength="11"
                                message-when-pattern-mismatch="Ingresá solo números"
                                pattern="[0-9]+"
                            ></lightning-input>
                        </div>
                    </div>

                    <template if:false={isCuitValid}>
                        <div class="alert alert-error">
                            <lightning-icon icon-name="utility:error" size="small" alternative-text="Error"></lightning-icon>
                            <span>El CUIT debe tener 11 dígitos numéricos.</span>
                        </div>
                    </template>

                    <div class="search-action-row">
                        <button class="btn btn-primary btn-search" onclick={handleSearchClick} disabled={isSearchDisabled}>
                            <template if:false={isLoading}>Buscar Usuario</template>
                            <template if:true={isLoading}>Buscando...</template>
                        </button>
                    </div>

                    <!-- Resultados de búsqueda -->
                    <template if:true={searchResults.length}>
                        <div class="search-results">
                            <label class="slds-form-element__label">Seleccionar Usuario ({searchResults.length})</label>
                            <div class="results-list">
                                <template for:each={searchResults} for:item="user">
                                    <button
                                        key={user.id}
                                        class="result-button"
                                        onclick={handleSelectUser}
                                        data-user-id={user.id}
                                        disabled={isLoading}
                                    >
                                        <div class="result-item">
                                            <div class="result-name">{user.name}</div>
                                            <div class="result-email">{user.email}</div>
                                            <div class="result-email">CUIT: {user.cuit}</div>
                                            <div class="result-username">{user.username}</div>
                                        </div>
                                    </button>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Estado: No encontrado -->
                    <template if:true={showNoResults}>
                        <div class="alert alert-info">
                            <lightning-icon icon-name="utility:info" size="small" alternative-text="Información"></lightning-icon>
                            <span>No se encontraron usuarios para el Email y CUIT ingresados.</span>
                        </div>
                    </template>
                </div>
            </div>

            <!-- PASO 2: Confirmación y Nueva Contraseña -->
            <template if:true={userSelected}>
                <div class={passwordStepContainerClass}>
                    <div class="step-number">
                        <span class={stepTwoBadgeClass}>2</span>
                    </div>
                    <div class="step-content">
                        <h3>Nueva Contraseña</h3>
                        <p class="step-description">Confirma el usuario y establece una nueva contraseña</p>
                        
                        <!-- Información del usuario seleccionado -->
                        <div class="user-card">
                            <lightning-icon icon-name="standard:user" size="medium" alternative-text="Usuario"></lightning-icon>
                            <div class="user-info">
                                <div class="user-name">{selectedUser.name}</div>
                                <div class="user-email">{selectedUser.email}</div>
                                <div class="user-email">CUIT: {selectedUser.cuit}</div>
                                <div class="user-username">Username: <strong>{selectedUser.username}</strong></div>
                            </div>
                            <button class="btn-change" onclick={handleBackToSearch} disabled={isLoading}>
                                Cambiar usuario
                            </button>
                        </div>

                        <!-- Campo de Nueva Contraseña -->
                        <div class="form-group">
                            <lightning-input
                                type="password"
                                label="Nueva Contraseña"
                                placeholder="Mínimo 8 caracteres"
                                value={newPassword}
                                onchange={handlePasswordChange}
                                disabled={isLoading}
                                required
                            ></lightning-input>
                            <small class="password-hint">
                                <lightning-icon icon-name="utility:info" size="x-small" alternative-text="Información"></lightning-icon>
                                Mínimo 8 caracteres, incluye mayúsculas, minúsculas y números
                            </small>
                        </div>

                        <!-- Campo de Confirmación -->
                        <div class="form-group">
                            <lightning-input
                                type="password"
                                label="Confirmar Contraseña"
                                placeholder="Repite la contraseña"
                                value={confirmPassword}
                                onchange={handleConfirmPasswordChange}
                                disabled={isLoading}
                                required
                            ></lightning-input>
                        </div>

                        <!-- Validación de contraseña -->
                        <template if:false={passwordsMatch}>
                            <template if:true={confirmPassword}>
                                <div class="alert alert-error">
                                    <lightning-icon icon-name="utility:error" size="small" alternative-text="Error"></lightning-icon>
                                    <span>Las contraseñas no coinciden</span>
                                </div>
                            </template>
                        </template>

                        <template if:false={isPasswordValid}>
                            <template if:true={newPassword}>
                                <div class="alert alert-error">
                                    <lightning-icon icon-name="utility:error" size="small" alternative-text="Error"></lightning-icon>
                                    <span>La contraseña debe tener mínimo 8 caracteres</span>
                                </div>
                            </template>
                        </template>

                        <!-- Botones de acción -->
                        <div class="button-group">
                            <button
                                class="btn btn-secondary"
                                onclick={handleBackToSearch}
                                disabled={isLoading}
                            >
                                ← Atrás
                            </button>
                            <button
                                class="btn btn-primary"
                                onclick={handleResetPassword}
                                disabled={isSaveDisabled}
                            >
                                <template if:false={isLoading}>
                                    Guardar Nueva Contraseña
                                </template>
                                <template if:true={isLoading}>
                                    <lightning-spinner alternative-text="Guardando..." size="small"></lightning-spinner>
                                    Guardando...
                                </template>
                            </button>
                        </div>
                    </div>
                </div>
            </template>

            <!-- PASO 3: Resultado Final -->
            <template if:true={showResult}>
                <div class={getResultContainerClass}>
                    <div class="result-content">
                        <template if:true={isSuccess}>
                            <div class="success-animation">
                                <lightning-icon icon-name="utility:success" size="large" alternative-text="Éxito"></lightning-icon>
                            </div>
                            <h4 class="result-title success">¡Éxito!</h4>
                            <p class="result-message">Contraseña actualizada correctamente</p>
                            <div class="result-details">
                                <p><strong>Usuario:</strong> {resultMessage.username}</p>
                                <p><strong>Email:</strong> {resultMessage.email}</p>
                            </div>
                        </template>

                        <template if:false={isSuccess}>
                            <div class="error-animation">
                                <lightning-icon icon-name="utility:error" size="large" alternative-text="Error"></lightning-icon>
                            </div>
                            <h4 class="result-title error">Error</h4>
                            <p class="result-message">{errorMessage}</p>
                        </template>

                        <button class="btn btn-primary" onclick={handleReset}>
                            Hacer otro reset
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
