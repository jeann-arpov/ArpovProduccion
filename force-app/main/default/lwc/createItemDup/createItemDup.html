<template>
    <lightning-card>
        <h3 slot="title">
            <lightning-icon icon-name="standard:timesheet" alternative-text="Event" size="small"></lightning-icon>
            &nbsp;Nuevas Variedades
        </h3>
        <div class="body">
            <template if:true={loading}>
                <div class="exampleHolder">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>
            <div tabindex="0" class="slds-m-top_xx-large"></div>
            
            <template if:true={shouldShow}>
                <c-item-dups-form></c-item-dups-form>
            </template>
            
            <template if:false={shouldShow}>
                <h2 class="slds-card__header-title">La transacción debe estar en estado Creada o Respondida para poder agregar variedades</h2>
            </template> 
        </div>
        <div slot="footer">
            <lightning-layout horizontal-align="end">
                <lightning-layout-item size="10">
                    <lightning-button onclick={cancel} class="slds-m-top_medium" type="submit" label="Cancelar"></lightning-button>
                    <lightning-button if:true={shouldShow} variant="brand" onclick={createItems} class="slds-m-top_medium slds-m-left--medium" type="submit" label="Grabar"></lightning-button>
                </lightning-layout-item>
            </lightning-layout>
        </div>
    </lightning-card>
</template>
