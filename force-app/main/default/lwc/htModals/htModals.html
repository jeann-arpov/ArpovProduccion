<template>
  <!-- Muestra el modal cuando isOpen = true -->
  <section if:true={showModal}  class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-card">
      <!-- Botón cerrar -->
       <template if:true={showClose}>
         <button class="modal-close" onclick={closeModal} aria-label="Cerrar">✕</button>
        </template>

      <!-- <button class="modal-close" onclick={closeModal} aria-label="Cerrar">✕</button> -->


        <!-- FINALIZADA -->
        <template if:true={showFinalizada}>
            <div class="modal-backdrop">
                <div class="modal">
                    <button class="modal-close" onclick={closeModal}>✕</button>
                    <h2 class="modal-title">{finalizadaText}</h2>
                    <p class="modal-text">{finalizadaSubText}</p>
                    <p class="modal-remember">
                        Recuerde que las HT serán acreditadas una vez efectuado el pago
                    </p>
                    <button class="modal-start" onclick={redirectMisLicencias}>
                        {licenciasLabel} ➝
                    </button>
                </div>
            </div>
        </template>

        <!-- FACTURANDO -->
        <template if:true={showFacturando}>
            <div class="modal-backdrop">
                <div class="modal">
                    <button class="modal-close" onclick={closeModal}>✕</button>
                    <svg class="slds-m-bottom_medium" width="33" height="33">
                        <use xlink:href={icons.error}></use>
                    </svg>
                    <h2>Por favor espere mientras se genera la facturación</h2>
                    <p>Recuerde que las HT serán acreditadas una vez efectuado el pago</p>
                    <div style="position:relative">
                        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                    </div>
                </div>
            </div>
        </template>

        <!-- FACTURADO -->
        <template if:true={showFacturado}>
            <div class="modal-backdrop">
                <div class="modal">
                    <button class="modal-close" onclick={closeModal}>✕</button>
                    <svg class="slds-m-bottom_medium" width="13.464" height="17.954">
                        <use xlink:href={icons.facturas}></use>
                    </svg>
                    <h2>FACTURACIÓN GENERADA CORRECTAMENTE</h2>
                    <p>Recuerde que las HT serán acreditadas una vez efectuado el pago</p>
                    <div class="slds-m-top_large">
                        <button type="button" onclick={redirectMisFacturas} class="modal-start">
                            <svg class="slds-m-right_small" width="13.464" height="17.954">
                                <use xlink:href={icons.facturas}></use>
                            </svg>
                            Ver facturas
                        </button>
                        <button type="button" onclick={redirectMisLicencias} class="modal-start">
                            <svg class="slds-m-right_small" width="14.763" height="17.954">
                                <use xlink:href={icons.licencias}></use>
                            </svg>
                            Ver licencias
                        </button>
                    </div>
                </div>
            </div>
        </template>
        <!-- VIGENCIA -->
        <template if:true={showVigencia}>
            <div class="modal-backdrop">
                <div class="modal">
                    <button class="modal-close" onclick={closeModal}>✕</button>
                    <svg class="slds-m-bottom_medium" width="33" height="33">
                        <use xlink:href={icons.error}></use>
                    </svg>
                    <h2>IMPORTANTE:</h2>
                    <p>{vigenciaText}</p>
                    <button type="button" onclick={closeModal} class="modal-start">Continuar</button>
                </div>
            </div>
        </template>

        <!-- ANULAR CONFIRM -->
        <template if:true={showAnularConfirm}>
            <div class="modal-backdrop">
                <div class="modal">
                    <button class="modal-close" onclick={closeModal}>✕</button>
                    <svg class="slds-m-bottom_medium" width="33" height="33">
                        <use xlink:href={icons.error}></use>
                    </svg>
                    <h2>¿Está seguro que desea anular la compra?</h2>
                    <div class="slds-m-top_medium">
                        <button class="modal-start" type="submit" label="" onclick={anular}>Sí</button>
                        <button class="modal-start" type="submit" label="" onclick={closeModal}>No</button>
                    </div>
                </div>
            </div>
        </template>

        <template if:true={isDuplicateCompra}>
            <div class="modal-backdrop">
                <div class="modal">
                    <button class="modal-close" onclick={closeModal}>✕</button>
                    <svg class="slds-m-bottom_medium" width="33" height="33">
                        <use xlink:href={icons.error}></use>
                    </svg>
                    <h2>Ya existe una compra en proceso</h2>
                    <p>Por favor, revisá tus operaciones previas en "Mis compras" antes de continuar.</p>
                    <div class="slds-m-top_medium">
                        <button class="modal-start" type="submit" label="" onclick={redirectCompras}>Ir a mis compras</button>
                        <button class="modal-start" type="submit" label="" onclick={closeModal}>Continuar</button>
                    </div>
                </div>
            </div>
        </template>

        <!-- DUPLICATE VENTA -->
        <template if:true={isDuplicateVenta}>
            <div class="modal-backdrop">
                <div class="modal">
                    <button class="modal-close" onclick={closeModal}>✕</button>
                    <svg class="slds-m-bottom_medium" width="33" height="33">
                        <use xlink:href={icons.error}></use>
                    </svg>
                    <h2>Ya existe una venta en proceso</h2>
                    <p>Por favor, revisá tus operaciones previas en "Mis ventas" antes de continuar.</p>
                    <div class="slds-m-top_medium">
                        <button class="modal-start" type="submit" label="" onclick={redirectVentas}>Ir a mis ventas</button>
                        <button class="modal-start" type="submit" label="" onclick={closeModal}>Continuar</button>
                    </div>
                </div>
            </div>
        </template>

        <!-- TIPO DE PAGO (no cerrable) -->
        <template if:true={showTipoPago}>
        <div class="modal-backdrop">
            <div class="modal" onclick={stopPropagation} onkeydown={handleKeydownNoEsc} tabindex="0">
            <!-- sin X -->
            <svg class="slds-m-bottom_medium" width="33" height="33">
                <use xlink:href={icons.error}></use>
            </svg>

            <h2>¿Cómo vas a pagar?</h2>
            <p>Elegí alguna de las opciones para poder continuar.</p>

            <div class="slds-m-top_medium" style="display:flex; gap:12px; justify-content:center;">
                <button class="modal-start" onclick={selectContado}>Contado</button>
                <button class="modal-start" onclick={selectFinanciado}>Plataformas/Tarjetas</button>
            </div>
            </div>
        </div>
        </template>

        <template if:true={showExpedienteDisponibleAlert}>
            <div class="modal-backdrop">
                <div class="modal">
                    <button class="modal-close" onclick={closeModal}>✕</button>
                    <svg class="slds-m-bottom_medium" width="33" height="33">
                        <use xlink:href={icons.error}></use>
                    </svg>
                    <h2>Importante</h2>
                    <p>
                        La compra de HT disponible solo puede aplicarse a situaciones previas a la entrega de grano.
                        <br/><br/>
                        Si se intenta utilizar esa HT para regularizar un saldo negativo, el caso será derivado al semillero para su análisis y aprobación.
                    </p>
                    <div class="slds-m-top_medium">
                        <button class="modal-start" type="button" onclick={closeModal}>Entendido</button>
                    </div>
                </div>
            </div>
        </template>

        <template if:true={showHtFuturaPromo}>
            <div class="modal-backdrop">
                <div class="modal">
                    <button class="modal-close" onclick={closeModal}>✕</button>
                    <svg class="slds-m-bottom_medium" width="33" height="33">
                        <use xlink:href={icons.error}></use>
                    </svg>
                    <h2>{htFuturaPromoTitle}</h2>
                    <p>{promoMessage}</p>
                    <div class="slds-m-top_medium">
                        <button class="modal-start" type="button" onclick={closeModal}>Entendido</button>
                    </div>
                </div>
            </div>
        </template>


    </div>
  </section>
</template>
