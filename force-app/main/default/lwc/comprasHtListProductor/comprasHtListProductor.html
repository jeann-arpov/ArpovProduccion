<template>
    <div class="ventas-container">
        <!-- TOP BAR con título + filtros y botón -->
        <div class="ventas-top-bar">
            <div class="ventas-header">
                <div class="breadcrumbs">COMPRAS / MIS COMPRAS</div>
                <div class="title">Mis Compras HT</div>
            </div>

            <div class="acciones-derecha">
                <div class="filtros-container">
                    <!-- Estado -->
                    <select data-id="estadoSelect" onchange={handleFilterChange}>
                        <template for:each={estados} for:item="item">
                            <option key={item} value={item}>{item}</option>
                        </template>
                    </select>

                    <!-- Cultivo -->
                    <select data-id="cultivoSelect" onchange={handleFilterChange}>
                        <template for:each={cultivos} for:item="item">
                            <option key={item} value={item}>{item}</option>
                        </template>
                    </select>

                    <!-- Variedad -->
                    <select data-id="variedadSelect" onchange={handleFilterChange}>
                        <template for:each={variedades} for:item="item">
                            <option key={item} value={item}>{item}</option>
                        </template>
                    </select>
                </div>
            </div>
        </div>

        <!-- Info + buscador -->
        <div class="info-busqueda">
            <div class="ventas-info">
                {totalRegistros} elementos (máximo 200 elementos) • Ordenado por Fecha de emisión • <br>
                Filtrado por Todas las Compras HT • Se actualizó hace una hora
            </div>

            <div class="ventas-search">
                <input type="text" oninput={handleSearchChange} placeholder="Buscar..." />
                <span class="search-icon">🔍</span>
            </div>
        </div>

        <!-- Tabla -->
        <table>
            <thead>
                <tr>
                    <th>FECHA</th>
                    <th>COMPRA HT</th>
                    <th>TOTAL HT</th>
                    <th>VARIEDADES</th>
                    <th>CULTIVO</th>
                    <th>ESTADO</th>
                </tr>
            </thead>
            <tbody>
                <template for:each={pageSlice} for:item="compra">
                    <tr key={compra.id}>
                        <td>{compra.fecha}</td>
                        <td>
                            <a href="javascript:void(0);" onclick={navigateToCompra} data-id={compra.id} data-name={compra.name}>
                                {compra.name}
                            </a>
                        </td>
                        <td>{compra.totalHT}</td>
                        <td>{compra.variedades}</td>
                        <td>{compra.cultivo}</td>
                        <td>{compra.estado}</td>
                    </tr>
                </template>
            </tbody>
        </table>

        <!-- Navegación -->
        <div class="paginacion">
            <button onclick={handlePrev} disabled={disablePrev}>Anterior</button>
            <span>Página {currentPage}</span>
            <button onclick={handleNext} disabled={disableNext}>Siguiente</button>
        </div>
    </div>
</template>
