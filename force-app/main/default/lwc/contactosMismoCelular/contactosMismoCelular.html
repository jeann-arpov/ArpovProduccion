<template>
    <div class="slds-box slds-theme_default">
        <template if:true={loading}>
            <div class="exampleHolder">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <div class="slds-grid slds-wrap" if:true={session}>
            <div class="slds-col slds-size_1-of-1">
                <div class="slds-box slds-box_x-small slds-text-align_center">
                    <span>{title}</span>
                    <div>{session.MessagingEndUser.Name}</div>
                </div>
            </div>
            <template for:each={contacts} for:item="contact" for:index="index">
                <div key={contact.Id} class="slds-col slds-size_5-of-12">
                    <div class="slds-var-p-around_small">{contact.Account.Name}</div>
                </div>
                <div key={contact.Id} class="slds-col slds-size_5-of-12">
                    <div class="slds-var-p-around_small">{contact.Name}</div>
                </div>
                <div key={contact.Id} class="slds-col slds-size_2-of-12">
                    <div class="slds-var-p-around_small">
                        <lightning-input type="checkbox" checked={contact.Contacto_Usuario_Mensajeria__c} label="a" variant="label-hidden"></lightning-input>
                    </div>
                </div>
            </template>
        </div>

        <div class="slds-grid slds-wrap" if:false={session}>
            <span if:false={loading}>No existe una sesión asociada</span>
        </div>


        <div class="slds-text-align_center" if:true={session}>
            <lightning-button disabled={cantSave} variant="brand" label="Guardar" onclick={save}></lightning-button>
        </div> 
    </div>
</template>
