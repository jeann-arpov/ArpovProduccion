<template>
    <div if:true={maxValue}>
        <lightning-layout vertical-align="center" horizontal-align="space" class="slds-text-align_center">
            <lightning-layout-item size="2">
                <svg width={logoWidth} height="100">
                    <use xlink:href={icono}></use>
                </svg>
            </lightning-layout-item>
            <lightning-layout-item size="2">
                {info.variedad.Name}
            </lightning-layout-item>
            <lightning-layout-item size="2">
                <lightning-input variant="label-hidden" required type="number" placeholder="Indica Cantidad de Toneladas" step="1" onchange={updateCantidad} onblur={blur} onfocus={focus} value={cantidad} message-when-value-missing="Este campo es obligatorio"></lightning-input>
            </lightning-layout-item>
            <lightning-layout-item size="1">
                <lightning-formatted-number class="slds-m-horizontal_large disponibles" value={disponibles}></lightning-formatted-number>
            </lightning-layout-item>
        </lightning-layout>
    </div>
</template>
